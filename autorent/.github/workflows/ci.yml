name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autorent
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: autorent/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Lint backend
        run: python -m ruff check .

      - name: Run backend tests
        run: python -m pytest tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autorent/autorent-pro/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: autorent/autorent-pro/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
