services:
  - type: web
    name: autorent-api
    runtime: python
    rootDir: autorent
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autorent-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://autorent-web.onrender.com,http://127.0.0.1:5173,http://localhost:5173

  - type: static
    name: autorent-web
    rootDir: autorent/autorent-pro/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://autorent-api.onrender.com

databases:
  - name: autorent-db
    plan: free
